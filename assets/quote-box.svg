<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="100%" height="180">
  <defs>
    <!-- Card Gradients -->
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0720" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0.95" />
    </linearGradient>

    <linearGradient id="border-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#00FF88" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&amp;family=Orbitron:wght@700&amp;display=swap');
    
    .editor-card {
      fill: url(#card-bg);
      stroke: url(#border-glow);
      stroke-width: 1.5;
    }
    
    .editor-header {
      fill: #08080c;
      stroke: #8B5CF6;
      stroke-opacity: 0.2;
    }

    .editor-dot {
      r: 4;
    }
    
    .code-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
    }

    .kw { fill: #8B5CF6; font-weight: 700; } /* Keyword */
    .fn { fill: #00D9FF; }                  /* Function */
    .op { fill: #ffffff; }                  /* Operator */
    .comment { fill: #555566; font-style: italic; }

    .cursor {
      fill: #00FF88;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    @keyframes border-pulse {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(139, 92, 246, 0.3)); }
      50% { filter: drop-shadow(0 0 10px rgba(0, 217, 255, 0.6)); }
    }

    .glow-card {
      animation: border-pulse 6s infinite;
    }
  </style>

  <!-- Glowing Card Outline -->
  <g class="glow-card">
    <rect x="5" y="5" width="490" height="170" rx="8" class="editor-card" />
  </g>
  
  <!-- Editor Header Bar -->
  <path d="M 5,13 A 8,8 0 0,1 13,5 L 487,5 A 8,8 0 0,1 495,13 L 495,30 L 5,30 Z" class="editor-header" />
  
  <!-- Editor Window Controls -->
  <circle cx="20" cy="17" r="4.5" fill="#FF5F56" />
  <circle cx="34" cy="17" r="4.5" fill="#FFBD2E" />
  <circle cx="48" cy="17" r="4.5" fill="#27C93F" />
  
  <!-- Editor Tab Title -->
  <text x="250" y="21" font-family="'Orbitron', sans-serif" font-size="10" font-weight="700" fill="#00FF88" text-anchor="middle" letter-spacing="1">LIFECYCLE_DAEMON.sh</text>

  <!-- Code Block -->
  <g class="code-text" transform="translate(30, 65)">
    <!-- Line 1 -->
    <text x="0" y="0">
      <tspan class="kw">while</tspan><tspan class="op">(</tspan><tspan fill="#00FF88">alive</tspan><tspan class="op">) {</tspan>
    </text>
    
    <!-- Line 2 -->
    <text x="24" y="22">
      <tspan class="fn">learn</tspan><tspan class="op">();</tspan>
    </text>
    
    <!-- Line 3 -->
    <text x="24" y="44">
      <tspan class="fn">build</tspan><tspan class="op">();</tspan>
    </text>
    
    <!-- Line 4 -->
    <text x="24" y="66">
      <tspan class="fn">deploy</tspan><tspan class="op">();</tspan>
    </text>
    
    <!-- Line 5 -->
    <text x="24" y="88">
      <tspan class="fn">repeat</tspan><tspan class="op">();</tspan>
    </text>
    
    <!-- Line 6 -->
    <text x="0" y="110">
      <tspan class="op">}</tspan> <rect class="cursor" x="15" y="-12" width="8" height="15" />
    </text>
  </g>

  <!-- Corner Details -->
  <line x1="450" y1="150" x2="480" y2="150" stroke="#8B5CF6" stroke-width="2" stroke-opacity="0.5" />
  <line x1="480" y1="120" x2="480" y2="150" stroke="#8B5CF6" stroke-width="2" stroke-opacity="0.5" />
  <text x="440" y="163" font-family="'JetBrains Mono', monospace" font-size="9" fill="#555566" text-anchor="end">UTF-8 // BASH // 100%</text>
</svg>
