<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="100%" height="280">
  <defs>
    <!-- Background and Glow Filters -->
    <linearGradient id="term-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070a" />
      <stop offset="100%" stop-color="#030305" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    
    .term-window {
      fill: url(#term-bg);
      stroke: #8B5CF6;
      stroke-width: 1.5;
      stroke-opacity: 0.6;
    }
    
    .term-header {
      fill: #0c0d12;
      stroke: #8B5CF6;
      stroke-opacity: 0.3;
    }
    
    .term-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      fill: #00FF88;
      opacity: 0;
    }

    .term-text-highlight {
      font-weight: 700;
      fill: #FFFFFF;
      filter: url(#glow);
    }
    
    .term-text-blue {
      fill: #00D9FF;
    }
    
    .term-text-purple {
      fill: #8B5CF6;
    }

    .cursor {
      animation: cursor-blink 0.8s infinite;
      fill: #00FF88;
    }

    /* Keyframe Animations */
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    @keyframes log-reveal {
      0% { opacity: 0; }
      1% { opacity: 1; }
      100% { opacity: 1; }
    }

    @keyframes boot-reset {
      0%, 90% { opacity: 1; }
      95%, 100% { opacity: 0; }
    }

    .boot-shell {
      animation: boot-reset 15s infinite;
    }

    /* Timing offsets for sequence */
    .line-1 { animation: log-reveal 15s forwards infinite; animation-delay: 0.5s; }
    .line-2 { animation: log-reveal 15s forwards infinite; animation-delay: 1.5s; }
    .line-3 { animation: log-reveal 15s forwards infinite; animation-delay: 2.5s; }
    .line-4 { animation: log-reveal 15s forwards infinite; animation-delay: 3.5s; }
    .line-5 { animation: log-reveal 15s forwards infinite; animation-delay: 4.5s; }
    .line-6 { animation: log-reveal 15s forwards infinite; animation-delay: 5.5s; }
    .line-7 { animation: log-reveal 15s forwards infinite; animation-delay: 6.5s; }
    .line-8 { animation: log-reveal 15s forwards infinite; animation-delay: 7.5s; }
    .line-9 { animation: log-reveal 15s forwards infinite; animation-delay: 8.5s; }
    .line-10 { animation: log-reveal 15s forwards infinite; animation-delay: 10s; }
    .line-11 { animation: log-reveal 15s forwards infinite; animation-delay: 11.5s; }
    .line-12 { animation: log-reveal 15s forwards infinite; animation-delay: 12.5s; }

  </style>

  <!-- Terminal Frame -->
  <rect x="5" y="5" width="590" height="270" rx="8" class="term-window" />
  
  <!-- Terminal Header Bar -->
  <path d="M 5,13 A 8,8 0 0,1 13,5 L 587,5 A 8,8 0 0,1 595,13 L 595,30 L 5,30 Z" class="term-header" />
  
  <!-- Window Controls (Mac Style) -->
  <circle cx="25" cy="17" r="5" fill="#FF5F56" />
  <circle cx="40" cy="17" r="5" fill="#FFBD2E" />
  <circle cx="55" cy="17" r="5" fill="#27C93F" />
  
  <!-- Terminal Title -->
  <text x="300" y="21" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#8B5CF6" text-anchor="middle" letter-spacing="1">SYSTEM_BOOT_DIAGNOSTIC (v4.0.8)</text>

  <!-- Boot Log Lines -->
  <g class="boot-shell" transform="translate(20, 55)">
    <!-- Line 1 -->
    <text x="0" y="0" class="term-text line-1">
      <tspan class="term-text-purple">[0.00284]</tspan> <tspan class="term-text-blue">SYSTEM_INIT_OK</tspan> : Booting AI profile cluster...
    </text>
    
    <!-- Line 2 -->
    <text x="0" y="20" class="term-text line-2">
      <tspan class="term-text-purple">[0.04910]</tspan> Loading AI Engine [neural_core.bin] ... <tspan class="term-text-highlight" fill="#00FF88">LOADED</tspan>
    </text>
    
    <!-- Line 3 -->
    <text x="0" y="40" class="term-text line-3">
      <tspan class="term-text-purple">[0.10824]</tspan> Activating Neural Network Layer [ML_PROPAGATOR] ... <tspan class="term-text-highlight" fill="#00FF88">ONLINE</tspan>
    </text>
    
    <!-- Line 4 -->
    <text x="0" y="60" class="term-text line-4">
      <tspan class="term-text-purple">[0.19830]</tspan> Deploying React runtime env [vite_dev] ... <tspan class="term-text-highlight" fill="#00FF88">COMPILED</tspan>
    </text>
    
    <!-- Line 5 -->
    <text x="0" y="80" class="term-text line-5">
      <tspan class="term-text-purple">[0.31294]</tspan> Injecting Java compiler bytecode [JDK_21] ... <tspan class="term-text-highlight" fill="#00FF88">SUCCESS</tspan>
    </text>
    
    <!-- Line 6 -->
    <text x="0" y="100" class="term-text line-6">
      <tspan class="term-text-purple">[0.48201]</tspan> Starting Spring Boot container microservices ... <tspan class="term-text-highlight" fill="#00FF88">RUNNING</tspan>
    </text>
    
    <!-- Line 7 -->
    <text x="0" y="120" class="term-text line-7">
      <tspan class="term-text-purple">[0.61890]</tspan> Loading OpenCV components &amp; gesture controller ... <tspan class="term-text-highlight" fill="#00FF88">READY</tspan>
    </text>
    
    <!-- Line 8 -->
    <text x="0" y="140" class="term-text line-8">
      <tspan class="term-text-purple">[0.78921]</tspan> Resolving ML models for Startup Incubator AI ... <tspan class="term-text-highlight" fill="#00FF88">RESOLVED</tspan>
    </text>
    
    <!-- Line 9 -->
    <text x="0" y="160" class="term-text line-9">
      <tspan class="term-text-purple">[0.91280]</tspan> Finalizing developer credentials (Kathirvel T) ... <tspan class="term-text-highlight" fill="#00FF88">AUTHENTICATED</tspan>
    </text>
    
    <!-- Line 10 -->
    <text x="0" y="190" class="term-text line-10" font-size="14" font-weight="700" fill="#00D9FF" filter="url(#glow)">
      &gt;&gt; ACCESS GRANTED: Security clearances approved.
    </text>

    <!-- Line 11 -->
    <text x="0" y="215" class="term-text line-11" font-size="14" font-weight="700" fill="#FFFFFF" filter="url(#glow)">
      &gt;&gt; Welcome Back, KATHIRVEL T. Start building. <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>
