<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 310" width="100%" height="310">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0821" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#030306" stop-opacity="0.95" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#00FF88" stroke-opacity="0.3" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
    
    .card-frame {
      fill: url(#card-bg);
      stroke: url(#card-border);
      stroke-width: 1.5;
    }

    .title-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      fill: #FFFFFF;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      fill: #a0aec0;
    }

    .feature-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: #00FF88;
    }

    .badge-bg {
      fill: #141226;
      stroke: #8B5CF6;
      stroke-width: 1;
      stroke-opacity: 0.6;
    }

    .badge-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      fill: #00D9FF;
      font-weight: 700;
    }

    /* Animations */
    @keyframes float-iso {
      0%, 100% { transform: translateY(0px) rotate3d(1, 1, 1, 0deg); }
      50% { transform: translateY(-8px) rotate3d(1, 1, 1, 2deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(139, 92, 246, 0.4)); }
      50% { filter: drop-shadow(0 0 12px rgba(0, 217, 255, 0.7)); }
    }

    .hologram-group {
      transform-origin: 430px 150px;
      animation: float-iso 4s ease-in-out infinite;
    }

    .animated-card {
      animation: pulse-glow 5s infinite ease-in-out;
    }

    .button-rect {
      fill: #0c0d12;
      stroke: #00FF88;
      stroke-width: 1.5;
    }

    .button-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      fill: #00FF88;
      font-weight: 700;
    }
  </style>

  <!-- Glowing Card Outline -->
  <g class="animated-card">
    <rect x="5" y="5" width="540" height="300" rx="12" class="card-frame" />
  </g>

  <!-- Card header status indicator -->
  <rect x="25" y="25" width="10" height="10" rx="2" fill="#00FF88" filter="url(#glow-blue)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </rect>
  <text x="42" y="34" font-family="'Orbitron', sans-serif" font-size="9" fill="#00FF88" font-weight="700" letter-spacing="1">PROJECT_01 // RUNNING</text>

  <!-- Project Title -->
  <text x="25" y="65" class="title-text">STARTUP INCUBATOR AI</text>

  <!-- Description -->
  <g transform="translate(25, 85)">
    <text x="0" y="0" class="desc-text">AI-powered business validator that predicts startup</text>
    <text x="0" y="16" class="desc-text">success, performs automated market insights, competitor</text>
    <text x="0" y="32" class="desc-text">analysis, and generates roadmaps.</text>
  </g>

  <!-- Features Checklist -->
  <g transform="translate(25, 145)">
    <text x="0" y="0" class="feature-text">[✓] Success Rate Predictor (ML)</text>
    <text x="0" y="15" class="feature-text">[✓] Competitor &amp; Financial Roadmaps</text>
    <text x="0" y="30" class="feature-text">[✓] Spring Boot REST Backend &amp; React UI</text>
  </g>

  <!-- Tech Badges (Grid) -->
  <g transform="translate(25, 195)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="45" height="18" rx="4" class="badge-bg" />
      <text x="22.5" y="12" class="badge-text" text-anchor="middle">Java</text>
    </g>
    <g transform="translate(50, 0)">
      <rect x="0" y="0" width="75" height="18" rx="4" class="badge-bg" />
      <text x="37.5" y="12" class="badge-text" text-anchor="middle">Spring Boot</text>
    </g>
    <g transform="translate(130, 0)">
      <rect x="0" y="0" width="45" height="18" rx="4" class="badge-bg" />
      <text x="22.5" y="12" class="badge-text" text-anchor="middle">React</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="50" height="18" rx="4" class="badge-bg" />
      <text x="25" y="12" class="badge-text" text-anchor="middle">MySQL</text>
    </g>
    
    <!-- Row 2 -->
    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="60" height="18" rx="4" class="badge-bg" stroke="#00D9FF" />
      <text x="30" y="12" class="badge-text" fill="#8B5CF6" text-anchor="middle">MongoDB</text>
    </g>
    <g transform="translate(65, 24)">
      <rect x="0" y="0" width="35" height="18" rx="4" class="badge-bg" stroke="#00D9FF" />
      <text x="17.5" y="12" class="badge-text" fill="#8B5CF6" text-anchor="middle">JWT</text>
    </g>
    <g transform="translate(105, 24)">
      <rect x="0" y="0" width="85" height="18" rx="4" class="badge-bg" stroke="#00D9FF" />
      <text x="42.5" y="12" class="badge-text" fill="#8B5CF6" text-anchor="middle">AI Integration</text>
    </g>
  </g>

  <!-- Interactive/Cyberpunk Action Buttons -->
  <g transform="translate(25, 260)">
    <!-- GitHub Button -->
    <g>
      <rect x="0" y="0" width="100" height="24" rx="4" class="button-rect" />
      <text x="50" y="15" class="button-text" text-anchor="middle">VIEW CODE</text>
    </g>
    <!-- Demo Button -->
    <g transform="translate(110, 0)">
      <rect x="0" y="0" width="110" height="24" rx="4" class="button-rect" stroke="#8B5CF6" />
      <text x="55" y="15" class="button-text" fill="#8B5CF6" text-anchor="middle">LAUNCH DEMO</text>
    </g>
  </g>

  <!-- Right Side: Highly Detailed 3D Holographic Wireframe Visualization -->
  <g class="hologram-group">
    <!-- Perspective Grid Base -->
    <ellipse cx="430" cy="210" rx="70" ry="25" fill="none" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1.5" />
    <ellipse cx="430" cy="210" rx="50" ry="18" fill="none" stroke="#00D9FF" stroke-opacity="0.2" stroke-width="1" />
    
    <!-- Vertical Glow Ray -->
    <linearGradient id="glow-ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </linearGradient>
    <polygon points="390,210 470,210 450,90 410,90" fill="url(#glow-ray)" />
    
    <!-- Floating Flowchart & Server Racks in 3D perspective -->
    <g stroke="#00FF88" stroke-width="1.2" fill="none" transform="translate(430, 115)">
      <!-- Server 1 (Database representation) -->
      <g transform="translate(-25, -25)" stroke="#8B5CF6">
        <ellipse cx="0" cy="0" rx="15" ry="6" fill="#0c0d12" />
        <path d="M -15,0 L -15,10 A 15,6 0 0,0 15,10 L 15,0" fill="#0c0d12" />
        <path d="M -15,10 L -15,20 A 15,6 0 0,0 15,20 L 15,10" fill="#0c0d12" />
        <line x1="-10" y1="5" x2="10" y2="5" stroke="#00D9FF" stroke-opacity="0.7" />
        <line x1="-10" y1="15" x2="10" y2="15" stroke="#00D9FF" stroke-opacity="0.7" />
      </g>
      
      <!-- Server 2 (Spring Boot Backend) -->
      <g transform="translate(25, -20)" stroke="#00D9FF">
        <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#0c0d12" />
        <circle cx="0" cy="0" r="4" fill="#00FF88" filter="url(#glow-blue)" />
        <line x1="-8" y1="-6" x2="8" y2="-6" stroke-width="0.8" />
        <line x1="-8" y1="6" x2="8" y2="6" stroke-width="0.8" />
      </g>

      <!-- Client UI (React Atom Wireframe) -->
      <g transform="translate(0, 35)" stroke="#00FF88">
        <ellipse cx="0" cy="0" rx="20" ry="7" />
        <ellipse cx="0" cy="0" rx="20" ry="7" transform="rotate(60)" />
        <ellipse cx="0" cy="0" rx="20" ry="7" transform="rotate(120)" />
        <circle cx="0" cy="0" r="3.5" fill="#FFFFFF" />
      </g>

      <!-- Connection vectors between databases/backend/ui -->
      <path d="M-25,-5 L0,35" stroke="#FFFFFF" stroke-opacity="0.5" stroke-dasharray="2,2" />
      <path d="M25,-5 L0,35" stroke="#FFFFFF" stroke-opacity="0.5" stroke-dasharray="2,2" />
      <path d="M-10,-15 L13,-10" stroke="#00FF88" stroke-opacity="0.8" />
    </g>

    <!-- Glowing dashboard metric graphs floating near model -->
    <path d="M 370,105 L 390,95 L 410,110 L 420,80" fill="none" stroke="#00D9FF" stroke-width="1.5" filter="url(#glow-blue)" />
    <circle cx="420" cy="80" r="3" fill="#FFFFFF" />
    <text x="370" y="85" font-family="'JetBrains Mono', monospace" font-size="7" fill="#00D9FF">VAL: 96%</text>

    <!-- Hologram HUD rings -->
    <circle cx="430" cy="120" r="60" fill="none" stroke="#8B5CF6" stroke-opacity="0.3" stroke-dasharray="3,6" />
  </g>
</svg>
