<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 310" width="100%" height="310">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050e1c" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#020407" stop-opacity="0.95" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF88" />
      <stop offset="50%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#8B5CF6" stroke-opacity="0.3" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
    
    .card-frame {
      fill: url(#card-bg);
      stroke: url(#card-border);
      stroke-width: 1.5;
    }

    .title-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      fill: #FFFFFF;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      fill: #a0aec0;
    }

    .feature-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: #00D9FF;
    }

    .badge-bg {
      fill: #0d1b2a;
      stroke: #00FF88;
      stroke-width: 1;
      stroke-opacity: 0.6;
    }

    .badge-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      fill: #00D9FF;
      font-weight: 700;
    }

    /* Animations */
    @keyframes scanner-sweep {
      0% { transform: translateY(-50px); }
      50% { transform: translateY(50px); }
      100% { transform: translateY(-50px); }
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(0, 255, 136, 0.4)); }
      50% { filter: drop-shadow(0 0 12px rgba(0, 217, 255, 0.7)); }
    }

    .scanner-bar {
      animation: scanner-sweep 4s linear infinite;
    }

    .animated-card {
      animation: pulse-glow 5s infinite ease-in-out;
    }

    .button-rect {
      fill: #0c0d12;
      stroke: #00FF88;
      stroke-width: 1.5;
    }

    .button-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      fill: #00FF88;
      font-weight: 700;
    }
  </style>

  <!-- Glowing Card Outline -->
  <g class="animated-card">
    <rect x="5" y="5" width="540" height="300" rx="12" class="card-frame" />
  </g>

  <!-- Card header status indicator -->
  <rect x="25" y="25" width="10" height="10" rx="2" fill="#00FF88" filter="url(#glow-green)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" />
  </rect>
  <text x="42" y="34" font-family="'Orbitron', sans-serif" font-size="9" fill="#00FF88" font-weight="700" letter-spacing="1">PROJECT_02 // SYSTEM_ONLINE</text>

  <!-- Project Title -->
  <text x="25" y="65" class="title-text">FACE RECOGNITION SYSTEM</text>

  <!-- Description -->
  <g transform="translate(25, 85)">
    <text x="0" y="0" class="desc-text">AI-driven biometric identification platform. Performs</text>
    <text x="0" y="16" class="desc-text">real-time face detection, facial landmarks analysis,</text>
    <text x="0" y="32" class="desc-text">feature embedding extraction, and security checks.</text>
  </g>

  <!-- Features Checklist -->
  <g transform="translate(25, 145)">
    <text x="0" y="0" class="feature-text">[✓] Real-time video processing &amp; FPS optimize</text>
    <text x="0" y="15" class="feature-text">[✓] OpenCV facial landmark coordinates detection</text>
    <text x="0" y="30" class="feature-text">[✓] NumPy accelerated multidimensional vector math</text>
  </g>

  <!-- Tech Badges -->
  <g transform="translate(25, 195)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="55" height="18" rx="4" class="badge-bg" />
      <text x="27.5" y="12" class="badge-text" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="55" height="18" rx="4" class="badge-bg" />
      <text x="27.5" y="12" class="badge-text" text-anchor="middle">OpenCV</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="50" height="18" rx="4" class="badge-bg" />
      <text x="25" y="12" class="badge-text" text-anchor="middle">NumPy</text>
    </g>
    <g transform="translate(175, 0)">
      <rect x="0" y="0" width="30" height="18" rx="4" class="badge-bg" stroke="#00D9FF" />
      <text x="15" y="12" class="badge-text" fill="#8B5CF6" text-anchor="middle">AI</text>
    </g>
  </g>

  <!-- Action Buttons -->
  <g transform="translate(25, 260)">
    <g>
      <rect x="0" y="0" width="100" height="24" rx="4" class="button-rect" />
      <text x="50" y="15" class="button-text" text-anchor="middle">VIEW CODE</text>
    </g>
    <g transform="translate(110, 0)">
      <rect x="0" y="0" width="110" height="24" rx="4" class="button-rect" stroke="#8B5CF6" />
      <text x="55" y="15" class="button-text" fill="#8B5CF6" text-anchor="middle">LAUNCH DEMO</text>
    </g>
  </g>

  <!-- Right Side: Highly Detailed 3D Holographic Face Mesh Scanning -->
  <g transform="translate(430, 150)">
    <!-- Complex Triangulated Mesh -->
    <!-- Nodes -->
    <!-- Center (0,0) represents nose bridge -->
    <g stroke="#00D9FF" stroke-opacity="0.35" stroke-width="1.0" fill="none">
      <!-- Outer facial borders -->
      <polygon points="-40,-55 -25,-60 0,-65 25,-60 40,-55 45,-25 48,5 42,30 25,50 0,58 -25,50 -42,30 -48,5 -45,-25" />
      <!-- Triangulations -->
      <!-- Eyebrows to forehead -->
      <line x1="-25" y1="-60" x2="-20" y2="-30" />
      <line x1="25" y1="-60" x2="20" y2="-30" />
      <line x1="0" y1="-65" x2="0" y2="-25" />
      <!-- Forehead to Nose bridge -->
      <line x1="-20" y1="-30" x2="0" y2="-25" />
      <line x1="20" y1="-30" x2="0" y2="-25" />
      <line x1="-40" y1="-55" x2="-20" y2="-30" />
      <line x1="40" y1="-55" x2="20" y2="-30" />
      <!-- Eyes to nose -->
      <line x1="-20" y1="-30" x2="-18" y2="-15" />
      <line x1="20" y1="-30" x2="18" y2="-15" />
      <line x1="-18" y1="-15" x2="0" y2="-10" />
      <line x1="18" y1="-15" x2="0" y2="-10" />
      <!-- Cheeks -->
      <line x1="-45" y1="-25" x2="-18" y2="-15" />
      <line x1="45" y1="-25" x2="18" y2="-15" />
      <line x1="-48" y1="5" x2="-18" y2="-15" />
      <line x1="48" y1="5" x2="18" y2="-15" />
      <line x1="-48" y1="5" x2="-20" y2="15" />
      <line x1="48" y1="5" x2="20" y2="15" />
      <!-- Nose to Mouth -->
      <line x1="0" y1="-10" x2="0" y2="10" />
      <line x1="0" y1="10" x2="-20" y2="15" />
      <line x1="0" y1="10" x2="20" y2="15" />
      <line x1="-20" y1="15" x2="-15" y2="35" />
      <line x1="20" y1="15" x2="15" y2="35" />
      <!-- Chin -->
      <line x1="-15" y1="35" x2="0" y2="40" />
      <line x1="15" y1="35" x2="0" y2="40" />
      <line x1="-25" y1="50" x2="-15" y2="35" />
      <line x1="25" y1="50" x2="15" y2="35" />
      <line x1="0" y1="58" x2="0" y2="40" />
    </g>

    <!-- Glowing Landmarks Nodes (Green) -->
    <g fill="#00FF88" opacity="0.9">
      <circle cx="0" cy="-65" r="2.5" />
      <circle cx="-25" cy="-60" r="2.5" />
      <circle cx="25" cy="-60" r="2.5" />
      <circle cx="-20" cy="-30" r="3" />
      <circle cx="20" cy="-30" r="3" />
      <circle cx="0" cy="-25" r="3" />
      <circle cx="-18" cy="-15" r="3" fill="#FFFFFF" filter="url(#glow-blue)" />
      <circle cx="18" cy="-15" r="3" fill="#FFFFFF" filter="url(#glow-blue)" />
      <circle cx="0" cy="-10" r="3" />
      <circle cx="-20" cy="15" r="3" />
      <circle cx="20" cy="15" r="3" />
      <circle cx="0" cy="10" r="3" />
      <circle cx="-15" cy="35" r="3" />
      <circle cx="15" cy="35" r="3" />
      <circle cx="0" cy="40" r="3.5" fill="#FFFFFF" filter="url(#glow-green)" />
    </g>

    <!-- Scan Line Sweeping Up & Down -->
    <g class="scanner-bar">
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#00FF88" stroke-width="2" filter="url(#glow-green)" />
      <polygon points="-60,0 60,0 50,7 -50,7" fill="#00FF88" fill-opacity="0.15" />
    </g>
    
    <!-- Target Reticle Corners -->
    <path d="M-65,-65 L-55,-65 M-65,-65 L-65,-55" stroke="#00FF88" stroke-width="1.5" />
    <path d="M65,-65 L55,-65 M65,-65 L65,-55" stroke="#00FF88" stroke-width="1.5" />
    <path d="M-65,65 L-55,65 M-65,65 L-65,55" stroke="#00FF88" stroke-width="1.5" />
    <path d="M65,65 L55,65 M65,65 L65,55" stroke="#00FF88" stroke-width="1.5" />

    <!-- Technical Readouts -->
    <text x="0" y="80" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00D9FF" text-anchor="middle" letter-spacing="1">FACIAL_ID: SCAN_MATCH_99.8%</text>
    <path d="M-55,-35 L-75,-35" stroke="#00D9FF" stroke-width="0.8" />
    <text x="-80" y="-32" font-family="'JetBrains Mono', monospace" font-size="6" fill="#00D9FF" text-anchor="end">DIST_A: 1.042</text>
  </g>
</svg>
