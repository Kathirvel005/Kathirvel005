<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" width="100%" height="300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050e18" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#020406" stop-opacity="0.95" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF88" />
      <stop offset="50%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#8B5CF6" stroke-opacity="0.3" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
    
    .card-frame {
      fill: url(#card-bg);
      stroke: url(#card-border);
      stroke-width: 1.5;
    }

    .title-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      fill: #FFFFFF;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      fill: #a0aec0;
    }

    .feature-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: #00D9FF;
    }

    .badge-bg {
      fill: #0d1b2a;
      stroke: #00FF88;
      stroke-width: 1;
      stroke-opacity: 0.6;
    }

    .badge-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      fill: #00D9FF;
      font-weight: 700;
    }

    /* Animations */
    @keyframes scanner-sweep {
      0% { transform: translateY(-40px); }
      50% { transform: translateY(40px); }
      100% { transform: translateY(-40px); }
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(0, 255, 136, 0.4)); }
      50% { filter: drop-shadow(0 0 12px rgba(0, 217, 255, 0.7)); }
    }

    .scanner-bar {
      animation: scanner-sweep 4s linear infinite;
    }

    .animated-card {
      animation: pulse-glow 5s infinite ease-in-out;
    }

    .button-rect {
      fill: #0c0d12;
      stroke: #00FF88;
      stroke-width: 1.5;
    }

    .button-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      fill: #00FF88;
      font-weight: 700;
    }
  </style>

  <!-- Glowing Card Outline -->
  <g class="animated-card">
    <rect x="5" y="5" width="540" height="290" rx="12" class="card-frame" />
  </g>

  <!-- Card header status indicator -->
  <rect x="25" y="25" width="10" height="10" rx="2" fill="#00FF88" filter="url(#glow-green)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" />
  </rect>
  <text x="42" y="34" font-family="'Orbitron', sans-serif" font-size="9" fill="#00FF88" font-weight="700" letter-spacing="1">PROJECT_02 // SYSTEM_ONLINE</text>

  <!-- Project Title -->
  <text x="25" y="65" class="title-text">FACE RECOGNITION SYSTEM</text>

  <!-- Description -->
  <g transform="translate(25, 85)">
    <text x="0" y="0" class="desc-text">AI-driven biometric identification platform. Performs</text>
    <text x="0" y="16" class="desc-text">real-time face detection, facial landmarks analysis,</text>
    <text x="0" y="32" class="desc-text">feature embedding extraction, and security checks.</text>
  </g>

  <!-- Features Checklist -->
  <g transform="translate(25, 145)">
    <text x="0" y="0" class="feature-text">[✓] Real-time video processing &amp; FPS optimize</text>
    <text x="0" y="15" class="feature-text">[✓] OpenCV facial landmark coordinates detection</text>
    <text x="0" y="30" class="feature-text">[✓] NumPy accelerated multidimensional vector math</text>
  </g>

  <!-- Tech Badges -->
  <g transform="translate(25, 195)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="55" height="18" rx="4" class="badge-bg" />
      <text x="27.5" y="12" class="badge-text" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="55" height="18" rx="4" class="badge-bg" />
      <text x="27.5" y="12" class="badge-text" text-anchor="middle">OpenCV</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="50" height="18" rx="4" class="badge-bg" />
      <text x="25" y="12" class="badge-text" text-anchor="middle">NumPy</text>
    </g>
    <g transform="translate(175, 0)">
      <rect x="0" y="0" width="30" height="18" rx="4" class="badge-bg" stroke="#00D9FF" />
      <text x="15" y="12" class="badge-text" fill="#8B5CF6" text-anchor="middle">AI</text>
    </g>
  </g>

  <!-- Action Buttons -->
  <g transform="translate(25, 255)">
    <g>
      <rect x="0" y="0" width="100" height="24" rx="4" class="button-rect" />
      <text x="50" y="15" class="button-text" text-anchor="middle">VIEW CODE</text>
    </g>
    <g transform="translate(110, 0)">
      <rect x="0" y="0" width="110" height="24" rx="4" class="button-rect" stroke="#8B5CF6" />
      <text x="55" y="15" class="button-text" fill="#8B5CF6" text-anchor="middle">LAUNCH DEMO</text>
    </g>
  </g>

  <!-- Right Side: 3D Holographic Face Mesh Scanning -->
  <g transform="translate(430, 150)">
    <!-- Face Contour Mesh Nodes -->
    <!-- Center (0,0) represents nose bridge -->
    <!-- Left Profile Nodes -->
    <path d="M-40,-50 L-30,-20 L-42,10 L-25,45 L0,55 L25,45 L42,10 L30,-20 L40,-50 Z" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1.2" fill="none" />
    <path d="M-20,-45 L-15,-20 L-25,10 L-10,35 L0,42 L10,35 L25,10 L15,-20 L20,-45 Z" stroke="#00FF88" stroke-opacity="0.25" stroke-width="1" fill="none" />
    
    <!-- Facial Features Lines (Eyes, Nose, Mouth) -->
    <!-- Eyes -->
    <ellipse cx="-18" cy="-22" rx="10" ry="5" stroke="#00FF88" stroke-opacity="0.7" fill="none" />
    <circle cx="-18" cy="-22" r="2" fill="#FFFFFF" filter="url(#glow-green)" />
    <ellipse cx="18" cy="-22" rx="10" ry="5" stroke="#00FF88" stroke-opacity="0.7" fill="none" />
    <circle cx="18" cy="-22" r="2" fill="#FFFFFF" filter="url(#glow-green)" />
    
    <!-- Nose -->
    <path d="M0,-25 L-5,0 L5,0 Z" stroke="#00D9FF" stroke-opacity="0.7" fill="none" />
    <line x1="-5" y1="0" x2="-10" y2="-5" stroke="#00D9FF" stroke-opacity="0.5" />
    <line x1="5" y1="0" x2="10" y2="-5" stroke="#00D9FF" stroke-opacity="0.5" />

    <!-- Mouth -->
    <path d="M-15,20 Q0,28 15,20 Q0,16 -15,20 Z" stroke="#8B5CF6" stroke-opacity="0.8" fill="none" />

    <!-- Landmark Coordinates Dots -->
    <g fill="#FFFFFF" opacity="0.9">
      <circle cx="-40" cy="-50" r="2" />
      <circle cx="40" cy="-50" r="2" />
      <circle cx="-30" cy="-20" r="2" />
      <circle cx="30" cy="-20" r="2" />
      <circle cx="-42" cy="10" r="2" />
      <circle cx="42" cy="10" r="2" />
      <circle cx="-25" cy="45" r="2" />
      <circle cx="25" cy="45" r="2" />
      <circle cx="0" cy="55" r="2" />
      <circle cx="-10" cy="35" r="1.5" />
      <circle cx="10" cy="35" r="1.5" />
      <circle cx="0" cy="-25" r="2" />
      <circle cx="0" cy="0" r="2" fill="#00FF88" />
    </g>

    <!-- Scan Line Sweeping Up & Down -->
    <g class="scanner-bar">
      <line x1="-55" y1="0" x2="55" y2="0" stroke="#00FF88" stroke-width="2" filter="url(#glow-green)" />
      <polygon points="-55,0 55,0 45,5 -45,5" fill="#00FF88" fill-opacity="0.15" />
    </g>
    
    <!-- Target Reticle Corners -->
    <path d="M-60,-60 L-50,-60 M-60,-60 L-60,-50" stroke="#00FF88" stroke-width="1.5" />
    <path d="M60,-60 L50,-60 M60,-60 L60,-50" stroke="#00FF88" stroke-width="1.5" />
    <path d="M-60,65 L-50,65 M-60,65 L-60,55" stroke="#00FF88" stroke-width="1.5" />
    <path d="M60,65 L50,65 M60,65 L60,55" stroke="#00FF88" stroke-width="1.5" />

    <!-- Telemetry Label -->
    <text x="0" y="78" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00D9FF" text-anchor="middle" letter-spacing="1">ID: KATHIRVEL_T // MATCH: 99.8%</text>
  </g>
</svg>
